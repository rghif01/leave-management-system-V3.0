<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - APM Leave Management</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1a3c6e, #2563a8); min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .card { background: white; border-radius: 20px; padding: 40px; text-align: center; max-width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        .icon { font-size: 60px; margin-bottom: 20px; }
        h2 { color: #1a3c6e; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 25px; }
        button { background: #1a3c6e; color: white; border: none; padding: 12px 30px; border-radius: 10px; font-size: 1rem; cursor: pointer; }
        button:hover { background: #2563a8; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">📵</div>
        <h2>You're Offline</h2>
        <p>APM Leave Management requires an internet connection. Please check your connection and try again.</p>
        <button onclick="window.location.reload()">🔄 Try Again</button>
    </div>
</body>
</html>
